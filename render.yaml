services:
  - type: web
    name: abs-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn abs_tracker.server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: cron
    name: abs-tracker-ingest
    runtime: python
    schedule: "0 9 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python ingestion.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
